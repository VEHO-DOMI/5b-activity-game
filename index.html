<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>5B Activity Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --draw: #ef4444;
    --draw-glow: rgba(239,68,68,0.25);
    --explain: #3b82f6;
    --explain-glow: rgba(59,130,246,0.25);
    --show: #22c55e;
    --show-glow: rgba(34,197,94,0.25);
    --bg: #0f0f1a;
    --bg2: #161625;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --card-hover: rgba(255,255,255,0.07);
    --text: #f1f1f4;
    --text-secondary: #a1a1b5;
    --muted: #6b6b80;
    --accent: #f43f5e;
    --accent-glow: rgba(244,63,94,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { overscroll-behavior: none; }
  button, input { touch-action: manipulation; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,59,171,0.15), transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(244,63,94,0.08), transparent);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 1.5rem);
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  h1 {
    font-size: 2rem; margin: 1.5rem 0 0.2rem; font-weight: 800;
    letter-spacing: -0.03em;
  }
  h1 span {
    background: linear-gradient(135deg, var(--accent), #fb923c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: var(--muted); font-size: 0.8rem; margin-bottom: 1.5rem;
    letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500;
  }

  /* Screens */
  .screen { display: none; width: 100%; max-width: 480px; padding: 0 1.25rem; }
  .screen.active {
    display: flex; flex-direction: column; align-items: center;
    animation: fadeIn 0.25s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Setup screen */
  .setup-section { width: 100%; margin-bottom: 1.5rem; }
  .setup-section label {
    display: block; font-weight: 600; margin-bottom: 0.6rem; font-size: 0.8rem;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary);
  }
  .setup-section input {
    width: 100%; padding: 0.75rem 1rem; border-radius: 12px;
    border: 1.5px solid var(--card-border); background: var(--card);
    color: var(--text); font-size: 0.95rem; font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    backdrop-filter: blur(10px);
  }
  .setup-section input:focus {
    border-color: var(--accent); outline: none;
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .setup-section input::placeholder { color: var(--muted); }
  .group-row {
    display: flex; gap: 0.5rem; margin-bottom: 0.6rem; align-items: center;
  }
  .group-row input { flex: 1; }
  .group-row button {
    background: rgba(239,68,68,0.15); border: 1.5px solid rgba(239,68,68,0.3);
    color: #f87171; width: 36px; height: 36px; border-radius: 10px;
    cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .group-row button:hover { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.5); }
  .add-group-btn {
    background: var(--card); border: 1.5px dashed var(--card-border); color: var(--muted);
    padding: 0.6rem; border-radius: 12px; cursor: pointer; width: 100%;
    font-size: 0.85rem; font-family: inherit; font-weight: 500;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .add-group-btn:hover {
    border-color: var(--accent); color: var(--text);
    background: rgba(244,63,94,0.05);
  }

  /* Buttons */
  .btn {
    padding: 0.7rem 1.4rem; border: none; border-radius: 12px; font-size: 0.9rem;
    cursor: pointer; font-weight: 600; font-family: inherit;
    transition: transform 0.12s, box-shadow 0.2s, background 0.15s;
    letter-spacing: -0.01em;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: scale(0.97) translateY(0); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #e11d48);
    color: white; box-shadow: 0 2px 12px var(--accent-glow);
  }
  .btn-primary:hover { box-shadow: 0 4px 20px var(--accent-glow); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .btn-secondary {
    background: rgba(255,255,255,0.06); color: var(--text-secondary);
    border: 1.5px solid var(--card-border);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .btn-success {
    background: linear-gradient(135deg, var(--show), #16a34a);
    color: white; box-shadow: 0 2px 12px var(--show-glow);
  }
  .btn-success:hover { box-shadow: 0 4px 20px var(--show-glow); }
  .btn-danger {
    background: rgba(239,68,68,0.15); color: #f87171;
    border: 1.5px solid rgba(239,68,68,0.25);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-small { padding: 0.45rem 0.9rem; font-size: 0.8rem; }
  .btn-block { width: 100%; }

  /* Scoreboard */
  .scoreboard {
    width: 100%; background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 16px; padding: 1rem 1.2rem; margin-bottom: 1.2rem;
    backdrop-filter: blur(10px);
  }
  .scoreboard h3 {
    margin-bottom: 0.6rem; font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }
  .score-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .score-row:last-child { border-bottom: none; }
  .score-row .group-name { font-weight: 600; font-size: 0.9rem; }
  .score-row .score {
    font-size: 1.15rem; font-weight: 800; color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .score-row.current {
    background: rgba(244,63,94,0.08); border-radius: 8px;
    padding: 0.5rem 0.7rem; margin: 0.1rem -0.7rem;
    border-bottom-color: transparent;
  }

  /* Category pick */
  .category-picker {
    display: flex; gap: 0.7rem; margin: 1.2rem 0 1.5rem; flex-wrap: wrap; justify-content: center;
    width: 100%;
  }
  .cat-btn {
    padding: 1.3rem 1rem; border-radius: 16px; border: none;
    font-size: 1rem; font-weight: 700; cursor: pointer; flex: 1; min-width: 120px;
    transition: transform 0.2s, box-shadow 0.2s; text-align: center;
    font-family: inherit; letter-spacing: -0.01em; position: relative; overflow: hidden;
  }
  .cat-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .cat-btn:hover { transform: translateY(-4px); }
  .cat-btn:active { transform: translateY(-1px); }
  .cat-draw {
    background: linear-gradient(135deg, var(--draw), #dc2626); color: white;
    box-shadow: 0 4px 20px var(--draw-glow);
  }
  .cat-draw:hover { box-shadow: 0 8px 30px var(--draw-glow); }
  .cat-explain {
    background: linear-gradient(135deg, var(--explain), #2563eb); color: white;
    box-shadow: 0 4px 20px var(--explain-glow);
  }
  .cat-explain:hover { box-shadow: 0 8px 30px var(--explain-glow); }
  .cat-show {
    background: linear-gradient(135deg, var(--show), #16a34a); color: white;
    box-shadow: 0 4px 20px var(--show-glow);
  }
  .cat-show:hover { box-shadow: 0 8px 30px var(--show-glow); }
  .cat-icon { display: block; font-size: 1.6rem; margin-bottom: 0.3rem; }

  /* Game play */
  .timer-bar {
    width: 100%; height: 6px; background: rgba(255,255,255,0.06);
    border-radius: 3px; margin-bottom: 0.8rem; overflow: hidden;
  }
  .timer-fill {
    height: 100%; border-radius: 3px; transition: width 0.1s linear;
    box-shadow: 0 0 10px currentColor;
  }
  .timer-text {
    font-size: 3.5rem; font-weight: 900; margin-bottom: 0.3rem;
    font-variant-numeric: tabular-nums; letter-spacing: -0.04em;
    line-height: 1;
  }
  .timer-text.warning { color: #f59e0b; }
  .timer-text.danger { color: var(--draw); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { to { opacity: 0.4; } }

  .category-label {
    font-size: 0.75rem; font-weight: 700; padding: 0.3rem 1rem;
    border-radius: 20px; margin-bottom: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .category-label.draw { background: rgba(239,68,68,0.2); color: #fca5a5; }
  .category-label.explain { background: rgba(59,130,246,0.2); color: #93c5fd; }
  .category-label.show { background: rgba(34,197,94,0.2); color: #86efac; }

  .word-card {
    background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 20px; padding: 2.5rem 2rem; width: 100%;
    text-align: center; margin-bottom: 1.2rem; min-height: 140px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    animation: wordPop 0.2s ease-out;
  }
  @keyframes wordPop {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .word-text {
    font-size: 1.7rem; font-weight: 800; line-height: 1.3;
    letter-spacing: -0.02em;
  }
  .word-source {
    font-size: 0.7rem; color: var(--muted); margin-top: 0.6rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;
  }

  .game-actions {
    display: flex; gap: 0.6rem; width: 100%; justify-content: center;
  }
  .game-actions .btn { flex: 1; min-width: 80px; }

  .round-score {
    font-size: 0.9rem; margin-bottom: 1rem; color: var(--muted); font-weight: 500;
  }
  .round-score strong {
    color: var(--text); font-size: 1.5rem; font-weight: 800;
    margin-left: 0.15rem;
  }

  /* Round summary */
  .summary-card {
    background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 20px; padding: 2rem 1.5rem; width: 100%;
    text-align: center; margin-bottom: 1.2rem;
    backdrop-filter: blur(10px);
  }
  .summary-card h2 { margin-bottom: 0.3rem; font-weight: 700; font-size: 1.1rem; color: var(--text-secondary); }
  .summary-points {
    font-size: 3.5rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1.1;
    background: linear-gradient(135deg, var(--accent), #fb923c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .summary-subtitle { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; font-weight: 500; }
  .summary-words {
    margin-top: 1.2rem; text-align: left;
    border-top: 1px solid rgba(255,255,255,0.06); padding-top: 0.8rem;
  }
  .summary-words li {
    padding: 0.5rem 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.04);
    list-style: none; display: flex; justify-content: space-between; align-items: center;
    font-size: 0.9rem; font-weight: 500; cursor: pointer; border-radius: 8px;
    transition: background 0.15s;
  }
  .summary-words li:hover { background: rgba(255,255,255,0.03); }
  .summary-words li:last-child { border-bottom: none; }
  .summary-words .correct { color: var(--show); font-weight: 600; }
  .summary-words .skipped { color: var(--muted); }
  .summary-words .toggle-hint {
    font-size: 0.6rem; color: var(--muted); opacity: 0.5; margin-left: 0.4rem; font-weight: 400;
  }
  .summary-words li.toggled { opacity: 0.55; }

  .action-bar { display: flex; gap: 0.6rem; width: 100%; margin-top: 0.3rem; }
  .action-bar .btn { flex: 1; }

  /* Final screen */
  .final-scores { width: 100%; }
  .final-row {
    display: flex; align-items: center;
    padding: 1rem 1.2rem; background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 14px; margin-bottom: 0.6rem; backdrop-filter: blur(10px);
  }
  .final-row.winner {
    border-color: rgba(250,204,21,0.4);
    background: rgba(250,204,21,0.06);
    box-shadow: 0 4px 20px rgba(250,204,21,0.1);
  }
  .final-row .rank { font-size: 1.6rem; margin-right: 1rem; flex-shrink: 0; }
  .final-row .name { font-weight: 600; flex: 1; font-size: 0.95rem; }
  .final-row .pts {
    font-size: 1.5rem; font-weight: 900; color: var(--accent);
    font-variant-numeric: tabular-nums; letter-spacing: -0.03em;
  }

  /* Info strip */
  .info-strip {
    display: flex; justify-content: space-between; width: 100%; color: var(--muted);
    font-size: 0.75rem; margin-bottom: 0.6rem; padding: 0 0.2rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
  }

  /* Bottom actions row */
  .bottom-actions {
    margin-top: 1.2rem; display: flex; gap: 0.5rem;
  }

  /* Mobile: hide header during gameplay to save space */
  @media (max-width: 600px) {
    body.playing h1, body.playing .subtitle { display: none; }
    body.playing { padding-bottom: 1rem; }
    body.playing .screen { padding-top: 0.5rem; }
  }

  /* Responsive */
  @media (max-width: 480px) {
    h1 { font-size: 1.6rem; margin-top: 1.2rem; }
    .subtitle { margin-bottom: 1rem; }
    .screen { padding: 0 1rem; }

    /* Play screen: compact top, big buttons */
    .timer-bar { margin-bottom: 0.3rem; }
    .timer-text { font-size: 2.6rem; margin-bottom: 0.1rem; }
    .category-label { margin-bottom: 0.3rem; padding: 0.2rem 0.8rem; font-size: 0.7rem; }
    .round-score { margin-bottom: 0.5rem; font-size: 0.85rem; }
    .round-score strong { font-size: 1.2rem; }
    .word-card { padding: 1.2rem 1rem; min-height: 85px; margin-bottom: 0.7rem; border-radius: 16px; }
    .word-text { font-size: 1.35rem; }
    /* BIG touch-friendly action buttons — stack vertically on mobile */
    .game-actions { gap: 0.5rem; flex-direction: column; }
    .game-actions .btn { padding: 1rem 0.5rem; font-size: 1rem; border-radius: 14px; min-height: 52px; width: 100%; }
    .overlay-actions { flex-direction: column; }
    .overlay-actions .btn { min-height: 48px; font-size: 0.95rem; }
    /* Reset buttons: small, pushed far down, visually separated */
    .bottom-actions { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .bottom-actions .btn { padding: 0.4rem 0.7rem; font-size: 0.7rem; opacity: 0.6; }

    /* Category buttons */
    .category-picker { gap: 0.5rem; margin: 0.8rem 0 1rem; }
    .cat-btn { padding: 1rem 0.6rem; font-size: 0.9rem; min-width: 90px; border-radius: 14px; }
    .cat-icon { font-size: 1.3rem; margin-bottom: 0.2rem; }

    /* Scoreboard */
    .scoreboard { padding: 0.8rem 1rem; margin-bottom: 0.8rem; border-radius: 14px; }
    .score-row .group-name { font-size: 0.85rem; }
    .score-row .score { font-size: 1rem; }

    /* Summary */
    .summary-card { padding: 1.5rem 1.2rem; border-radius: 16px; }
    .summary-points { font-size: 2.8rem; }

    /* Final */
    .final-row { padding: 0.8rem 1rem; }
    .final-row .rank { font-size: 1.3rem; margin-right: 0.7rem; }
    .final-row .pts { font-size: 1.3rem; }
  }

  /* Confirmation overlay */
  .overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    justify-content: center; align-items: center;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .overlay.active { display: flex; }
  .overlay-card {
    background: var(--bg2); border: 1.5px solid var(--card-border);
    border-radius: 20px; padding: 2rem;
    max-width: 360px; width: 90%; text-align: center;
    animation: overlayIn 0.2s ease-out;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  @keyframes overlayIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  .overlay-card h3 { margin-bottom: 0.6rem; font-weight: 700; font-size: 1.1rem; }
  .overlay-card p { color: var(--text-secondary); margin-bottom: 1.2rem; font-size: 0.85rem; line-height: 1.4; }
  .overlay-actions { display: flex; gap: 0.5rem; }
  .overlay-actions .btn { flex: 1; }

  /* Game history */
  .history-section {
    width: 100%; margin-top: 2rem; padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .history-section h3 {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); font-weight: 600; margin-bottom: 0.8rem;
  }
  .history-entry {
    background: var(--card); border: 1.5px solid var(--card-border);
    border-radius: 14px; padding: 0.9rem 1rem; margin-bottom: 0.6rem;
    backdrop-filter: blur(10px);
  }
  .history-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.5rem;
  }
  .history-date { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
  .history-delete {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.75rem; padding: 0.2rem 0.4rem; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .history-delete:hover { color: #f87171; background: rgba(239,68,68,0.1); }
  .history-scores {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
  }
  .history-team {
    display: flex; align-items: center; gap: 0.3rem;
    background: rgba(255,255,255,0.04); padding: 0.25rem 0.6rem;
    border-radius: 8px; font-size: 0.8rem;
  }
  .history-team .ht-name { font-weight: 500; color: var(--text-secondary); }
  .history-team .ht-score { font-weight: 800; color: var(--accent); }
  .history-team.ht-winner .ht-name { color: var(--text); }
  .history-team.ht-winner { background: rgba(250,204,21,0.08); }
  .history-clear {
    margin-top: 0.5rem; background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.75rem; font-family: inherit; padding: 0.3rem 0;
    transition: color 0.15s;
  }
  .history-clear:hover { color: #f87171; }
  .history-empty { color: var(--muted); font-size: 0.8rem; font-style: italic; }

  /* Times up animation */
  .times-up { animation: shake 0.4s ease-out; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
</style>
</head>
<body>

<h1>5B <span>Activity</span> Game</h1>
<p class="subtitle">Draw &bull; Explain &bull; Show</p>

<!-- SCREEN: Setup -->
<div id="setup-screen" class="screen active">
  <div class="setup-section">
    <label>Group Names</label>
    <div id="groups-container">
      <div class="group-row">
        <input type="text" placeholder="Group 1" class="group-input" maxlength="30">
        <button onclick="removeGroup(this)" title="Remove">&times;</button>
      </div>
      <div class="group-row">
        <input type="text" placeholder="Group 2" class="group-input" maxlength="30">
        <button onclick="removeGroup(this)" title="Remove">&times;</button>
      </div>
    </div>
    <button class="add-group-btn" onclick="addGroup()">+ Add Group</button>
  </div>
  <button class="btn btn-primary btn-block" onclick="startGame()" id="start-btn">Start Game</button>
  <div class="history-section" id="history-section"></div>
</div>

<!-- SCREEN: Category Pick -->
<div id="pick-screen" class="screen">
  <div class="scoreboard" id="pick-scoreboard"></div>
  <div class="info-strip">
    <span id="pick-group-label"></span>
    <span id="words-remaining"></span>
  </div>
  <p style="margin-bottom:0.2rem; font-size:1.05rem; font-weight:600;" id="pick-prompt"></p>
  <div class="category-picker">
    <button class="cat-btn cat-draw" onclick="pickCategory('draw')"><span class="cat-icon">&#9998;</span>Draw</button>
    <button class="cat-btn cat-explain" onclick="pickCategory('explain')"><span class="cat-icon">&#128172;</span>Explain</button>
    <button class="cat-btn cat-show" onclick="pickCategory('show')"><span class="cat-icon">&#127917;</span>Show</button>
  </div>
  <div class="bottom-actions">
    <button class="btn btn-secondary btn-small" onclick="confirmResetGame()">Reset Game</button>
    <button class="btn btn-secondary btn-small" onclick="endGameEarly()">End Game</button>
  </div>
</div>

<!-- SCREEN: Playing -->
<div id="play-screen" class="screen">
  <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
  <div class="timer-text" id="timer-text">60</div>
  <div class="category-label" id="cat-label"></div>
  <div class="round-score">Round score: <strong id="round-score-num">0</strong></div>
  <div class="word-card">
    <div class="word-text" id="word-text">—</div>
    <div class="word-source" id="word-source"></div>
  </div>
  <div class="game-actions">
    <button class="btn btn-success" onclick="markCorrect()" id="correct-btn">&#10003; Correct</button>
    <button class="btn btn-secondary" onclick="skipWord()">Skip</button>
    <button class="btn btn-danger btn-small" onclick="undoLast()" id="undo-btn" disabled>Undo</button>
  </div>
  <div class="bottom-actions">
    <button class="btn btn-secondary btn-small" onclick="confirmResetRound()">Reset Round</button>
    <button class="btn btn-secondary btn-small" onclick="confirmResetGame()">Reset Game</button>
  </div>
</div>

<!-- SCREEN: Round Summary -->
<div id="summary-screen" class="screen">
  <div class="summary-card">
    <h2 id="summary-group">Group</h2>
    <div class="summary-points" id="summary-points">0</div>
    <p class="summary-subtitle">points this round</p>
    <ul class="summary-words" id="summary-words"></ul>
  </div>
  <div class="scoreboard" id="summary-scoreboard"></div>
  <div class="action-bar">
    <button class="btn btn-secondary" onclick="undoRound()">&#8617; Undo Round</button>
    <button class="btn btn-primary" onclick="nextTurn()">Next Turn &rarr;</button>
  </div>
</div>

<!-- SCREEN: Final -->
<div id="final-screen" class="screen">
  <h2 style="margin-bottom:1.2rem; font-size:1.5rem; font-weight:800; letter-spacing:-0.03em;">Game Over!</h2>
  <div class="final-scores" id="final-scores"></div>
  <button class="btn btn-primary btn-block" style="margin-top:1.5rem;" onclick="newGame()">New Game</button>
</div>

<!-- Time's Up Overlay -->
<div class="overlay" id="timesup-overlay">
  <div class="overlay-card times-up">
    <h3>⏰ Time's Up!</h3>
    <p>The last word was: <strong id="timesup-word" style="color:var(--text);display:block;font-size:1.2rem;margin-top:0.3rem;"></strong></p>
    <p style="margin-top:0.5rem;">Did the team get this word before the buzzer?</p>
    <div class="overlay-actions">
      <button class="btn btn-success" onclick="timesUpAnswer(true)">Yes ✓</button>
      <button class="btn btn-secondary" onclick="timesUpAnswer(false)">No ✗</button>
    </div>
  </div>
</div>

<!-- Confirmation Overlay -->
<div class="overlay" id="confirm-overlay">
  <div class="overlay-card">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="overlay-actions">
      <button class="btn btn-secondary" onclick="closeOverlay()">Cancel</button>
      <button class="btn btn-danger" id="confirm-action-btn">Confirm</button>
    </div>
  </div>
</div>

// ============================================================
// SOUND EFFECTS (Web Audio API — no external files)
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', vol = 0.3, delay = 0) {
  const ctx = getAudio();
  const t = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

function playNoise(duration, vol = 0.3, delay = 0) {
  const ctx = getAudio();
  const t = ctx.currentTime + delay;
  const bufSize = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  src.connect(gain);
  gain.connect(ctx.destination);
  src.start(t);
  src.stop(t + duration);
}

function sfxCorrect() {
  // Bright game-show "ding ding!" — major chord hit
  const ctx = getAudio();
  [523, 659, 784, 1047].forEach((f, i) => {
    playTone(f, 0.3, 'sine', 0.18, i * 0.01);
  });
  playTone(1047, 0.4, 'sine', 0.12, 0.08);
}

function sfxSkip() {
  // Quick descending "womp" — game show wrong/pass
  playTone(400, 0.12, 'triangle', 0.2);
  playTone(280, 0.15, 'triangle', 0.18, 0.06);
  playTone(180, 0.12, 'triangle', 0.1, 0.12);
}

function sfxCountdownBeep() {
  // Harsh, urgent game-show countdown tick
  const ctx = getAudio();
  playTone(1200, 0.08, 'square', 0.35);
  playTone(1200, 0.06, 'square', 0.2, 0.1);
  playNoise(0.03, 0.15);
}

function sfxBuzzer() {
  // Loud, harsh game-show buzzer — layered for intensity
  const ctx = getAudio();
  const t = ctx.currentTime;
  // Layer 1: detuned sawtooth pair (fat buzzing)
  [80, 83, 160, 163].forEach(f => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.setValueAtTime(0.2, t + 0.6);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 1.0);
  });
  // Layer 2: square wave grit
  const osc2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  osc2.type = 'square';
  osc2.frequency.value = 120;
  g2.gain.setValueAtTime(0.15, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
  osc2.connect(g2);
  g2.connect(ctx.destination);
  osc2.start(t);
  osc2.stop(t + 0.9);
  // Layer 3: noise burst for harshness
  playNoise(0.5, 0.12);
}

// Track which seconds we've beeped for (avoid double-beeping)
let beepedSeconds = new Set();

// ============================================================
// GAME STATE
// ============================================================
let state = {
  groups: [],          // [{name, score}]
  currentGroupIdx: 0,
  currentCategory: null,
  usedWordIds: new Set(),       // indices of CORRECT words — permanently out of game
  roundSkippedIds: new Set(),   // indices skipped THIS round — avoid repeats within round only
  roundWords: [],               // [{wordIdx, result:'correct'|'skipped'}]
  roundScore: 0,
  timer: null,
  timeLeft: 60,
  gameStarted: false,
  roundActive: false,
  currentWordIdx: null,
  history: [],                  // for undo within a round
  roundUndoSnapshot: null,      // snapshot before round started for undo-round
};

// ============================================================
// SETUP
// ============================================================
function addGroup() {
  const c = document.getElementById('groups-container');
  const n = c.querySelectorAll('.group-row').length + 1;
  const row = document.createElement('div');
  row.className = 'group-row';
  row.innerHTML = `<input type="text" placeholder="Group ${n}" class="group-input" maxlength="30">
    <button onclick="removeGroup(this)" title="Remove">&times;</button>`;
  c.appendChild(row);
}

function removeGroup(btn) {
  const c = document.getElementById('groups-container');
  if (c.querySelectorAll('.group-row').length <= 2) return;
  btn.parentElement.remove();
}

function startGame() {
  // Initialize audio context on user gesture (required for mobile Safari)
  getAudio();
  const inputs = document.querySelectorAll('.group-input');
  const groups = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `Group ${i + 1}`;
    groups.push({ name, score: 0 });
  });
  if (groups.length < 2) return;
  state.groups = groups;
  state.currentGroupIdx = 0;
  state.usedWordIds = new Set();
  state.gameStarted = true;
  showScreen('pick');
}

// ============================================================
// SCREENS
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  // Hide header on play screen for mobile space
  document.body.classList.toggle('playing', name === 'play');
  window.scrollTo(0, 0);
  if (name === 'setup') renderHistory();
  if (name === 'pick') updatePickScreen();
  if (name === 'final') updateFinalScreen();
}

function updatePickScreen() {
  const g = state.groups[state.currentGroupIdx];
  document.getElementById('pick-prompt').textContent = `${g.name}, choose a category:`;
  document.getElementById('pick-group-label').textContent = `Turn: ${g.name}`;
  const remaining = ALL_WORDS.length - state.usedWordIds.size;
  document.getElementById('words-remaining').textContent = `${remaining} words left`;
  renderScoreboard('pick-scoreboard');
}

function renderScoreboard(containerId) {
  const el = document.getElementById(containerId);
  let html = '<h3>Scoreboard</h3>';
  state.groups.forEach((g, i) => {
    const cls = i === state.currentGroupIdx ? ' current' : '';
    html += `<div class="score-row${cls}"><span class="group-name">${esc(g.name)}</span><span class="score">${g.score}</span></div>`;
  });
  el.innerHTML = html;
}

// ============================================================
// CATEGORY & ROUND
// ============================================================
function getWordsForCategory(cat) {
  return ALL_WORDS.map((w, i) => ({ ...w, idx: i }))
    .filter(w => w.categories.includes(cat) && !state.usedWordIds.has(w.idx) && !state.roundSkippedIds.has(w.idx));
}

function pickCategory(cat) {
  const available = getWordsForCategory(cat);
  if (available.length === 0) {
    alert('No more words available for this category! Try another.');
    return;
  }
  state.currentCategory = cat;
  state.roundWords = [];
  state.roundScore = 0;
  state.history = [];
  state.roundSkippedIds = new Set();
  state.timeLeft = 60;
  state.roundActive = true;
  beepedSeconds = new Set();

  // Save snapshot for undo-round
  state.roundUndoSnapshot = {
    usedWordIds: new Set(state.usedWordIds),
    groupScore: state.groups[state.currentGroupIdx].score,
  };

  showScreen('play');
  setupPlayScreen();
  nextWord();
  startTimer();
}

function setupPlayScreen() {
  const cat = state.currentCategory;
  const label = document.getElementById('cat-label');
  label.textContent = cat === 'draw' ? '✏️ Draw' : cat === 'explain' ? '💬 Explain' : '🎭 Show';
  label.className = 'category-label ' + cat;
  const fill = document.getElementById('timer-fill');
  fill.style.width = '100%';
  fill.style.background = cat === 'draw' ? 'var(--draw)' : cat === 'explain' ? 'var(--explain)' : 'var(--show)';
  document.getElementById('round-score-num').textContent = '0';
  document.getElementById('undo-btn').disabled = true;
}

function nextWord() {
  const available = getWordsForCategory(state.currentCategory);
  if (available.length === 0) {
    endRound();
    return;
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  state.currentWordIdx = pick.idx;
  document.getElementById('word-text').textContent = pick.text;
  document.getElementById('word-source').textContent = pick.source;
}

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.timeLeft -= 0.1;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      clearInterval(state.timer);
      endRound();
    }
    updateTimerDisplay();
  }, 100);
}

function updateTimerDisplay() {
  const secs = Math.ceil(state.timeLeft);
  const el = document.getElementById('timer-text');
  el.textContent = secs;
  el.className = 'timer-text' + (secs <= 5 ? ' danger' : secs <= 15 ? ' warning' : '');
  const pct = (state.timeLeft / 60) * 100;
  document.getElementById('timer-fill').style.width = pct + '%';
  // Countdown beeps for last 5 seconds
  if (secs <= 5 && secs >= 1 && !beepedSeconds.has(secs) && state.roundActive) {
    beepedSeconds.add(secs);
    sfxCountdownBeep();
  }
}

// ============================================================
// GAME ACTIONS
// ============================================================
function markCorrect() {
  if (!state.roundActive) return;
  sfxCorrect();
  const idx = state.currentWordIdx;
  state.usedWordIds.add(idx);
  state.roundWords.push({ wordIdx: idx, result: 'correct' });
  state.roundScore++;
  state.history.push({ action: 'correct', wordIdx: idx });
  document.getElementById('round-score-num').textContent = state.roundScore;
  document.getElementById('undo-btn').disabled = false;
  nextWord();
}

function skipWord() {
  if (!state.roundActive) return;
  sfxSkip();
  const idx = state.currentWordIdx;
  state.roundSkippedIds.add(idx);  // Only skip for this round, stays in pool for future rounds
  state.roundWords.push({ wordIdx: idx, result: 'skipped' });
  state.history.push({ action: 'skip', wordIdx: idx });
  document.getElementById('undo-btn').disabled = false;
  nextWord();
}

function undoLast() {
  if (state.history.length === 0) return;
  const last = state.history.pop();
  if (last.action === 'correct') {
    state.usedWordIds.delete(last.wordIdx);
    state.roundScore--;
    document.getElementById('round-score-num').textContent = state.roundScore;
  } else {
    state.roundSkippedIds.delete(last.wordIdx);
  }
  state.roundWords.pop();
  // Show the undone word again
  state.currentWordIdx = last.wordIdx;
  document.getElementById('word-text').textContent = ALL_WORDS[last.wordIdx].text;
  document.getElementById('word-source').textContent = ALL_WORDS[last.wordIdx].source;
  document.getElementById('undo-btn').disabled = state.history.length === 0;
}

// ============================================================
// END ROUND
// ============================================================
function endRound() {
  clearInterval(state.timer);
  state.roundActive = false;
  sfxBuzzer();
  // Show time's-up dialog if there was a word being displayed
  const lastWord = state.currentWordIdx !== null ? ALL_WORDS[state.currentWordIdx] : null;
  if (lastWord && state.roundWords.length > 0) {
    document.getElementById('timesup-word').textContent = lastWord.text;
    document.getElementById('timesup-overlay').classList.add('active');
    state._timesUpWordIdx = state.currentWordIdx;
  } else {
    state.groups[state.currentGroupIdx].score += state.roundScore;
    showScreen('summary');
    updateSummaryScreen();
  }
}

function timesUpAnswer(gotIt) {
  document.getElementById('timesup-overlay').classList.remove('active');
  if (gotIt && state._timesUpWordIdx !== null) {
    state.usedWordIds.add(state._timesUpWordIdx);
    state.roundWords.push({ wordIdx: state._timesUpWordIdx, result: 'correct' });
    state.roundScore++;
  }
  state._timesUpWordIdx = null;
  state.groups[state.currentGroupIdx].score += state.roundScore;
  showScreen('summary');
  updateSummaryScreen();
}

function updateSummaryScreen() {
  const g = state.groups[state.currentGroupIdx];
  document.getElementById('summary-group').textContent = g.name;
  document.getElementById('summary-points').textContent = state.roundScore;
  const list = document.getElementById('summary-words');
  list.innerHTML = '';
  state.roundWords.forEach((rw, i) => {
    const w = ALL_WORDS[rw.wordIdx];
    const cls = rw.result === 'correct' ? 'correct' : 'skipped';
    const icon = rw.result === 'correct' ? '✓' : '—';
    const li = document.createElement('li');
    li.innerHTML = `<span>${esc(w.text)}</span><span class="${cls}">${icon}<span class="toggle-hint"> tap</span></span>`;
    li.onclick = () => toggleSummaryWord(i);
    list.appendChild(li);
  });
  renderScoreboard('summary-scoreboard');
}

function toggleSummaryWord(index) {
  const rw = state.roundWords[index];
  const g = state.groups[state.currentGroupIdx];
  if (rw.result === 'correct') {
    // Toggle to skipped: remove point
    rw.result = 'skipped';
    state.roundScore--;
    g.score--;
    state.usedWordIds.delete(rw.wordIdx);
    state.roundSkippedIds.add(rw.wordIdx);
  } else {
    // Toggle to correct: add point
    rw.result = 'correct';
    state.roundScore++;
    g.score++;
    state.usedWordIds.add(rw.wordIdx);
    state.roundSkippedIds.delete(rw.wordIdx);
  }
  updateSummaryScreen();
}

function undoRound() {
  // Restore state to before the round
  if (!state.roundUndoSnapshot) return;
  state.usedWordIds = state.roundUndoSnapshot.usedWordIds;
  state.groups[state.currentGroupIdx].score = state.roundUndoSnapshot.groupScore;
  state.roundWords = [];
  state.roundScore = 0;
  state.roundSkippedIds = new Set();
  state.history = [];
  state.roundUndoSnapshot = null;
  showScreen('pick');
}

function nextTurn() {
  // Check if all words used
  if (state.usedWordIds.size >= ALL_WORDS.length) {
    showScreen('final');
    return;
  }
  state.currentGroupIdx = (state.currentGroupIdx + 1) % state.groups.length;
  showScreen('pick');
}

// ============================================================
// RESET
// ============================================================
function confirmResetRound() {
  showOverlay('Reset Round?', 'The timer will restart. Words used this round will stay marked as used.', () => {
    clearInterval(state.timer);
    state.roundActive = false;
    // Only correctly solved words stay used; skipped go back to pool
    state.roundWords = [];
    state.roundScore = 0;
    state.roundSkippedIds = new Set();
    state.history = [];
    showScreen('pick');
    closeOverlay();
  });
}

function confirmResetGame() {
  showOverlay('Reset Game?', 'All scores and progress will be lost. Are you sure?', () => {
    clearInterval(state.timer);
    state = {
      groups: [], currentGroupIdx: 0, currentCategory: null,
      usedWordIds: new Set(), roundSkippedIds: new Set(), roundWords: [], roundScore: 0,
      timer: null, timeLeft: 60, gameStarted: false, roundActive: false,
      currentWordIdx: null, history: [], roundUndoSnapshot: null,
    };
    closeOverlay();
    showScreen('setup');
  });
}

function endGameEarly() {
  showOverlay('End Game?', 'End the game now and see final scores?', () => {
    clearInterval(state.timer);
    closeOverlay();
    showScreen('final');
  });
}

function newGame() {
  state = {
    groups: [], currentGroupIdx: 0, currentCategory: null,
    usedWordIds: new Set(), roundWords: [], roundScore: 0,
    timer: null, timeLeft: 60, gameStarted: false, roundActive: false,
    currentWordIdx: null, history: [], roundUndoSnapshot: null,
  };
  showScreen('setup');
}

// ============================================================
// FINAL SCREEN
// ============================================================
function updateFinalScreen() {
  if (!state.historySaved) { saveGameToHistory(); state.historySaved = true; }
  const sorted = [...state.groups].sort((a, b) => b.score - a.score);
  const maxScore = sorted[0]?.score || 0;
  const el = document.getElementById('final-scores');
  const medals = ['🥇', '🥈', '🥉'];
  el.innerHTML = '';
  sorted.forEach((g, i) => {
    const win = g.score === maxScore && maxScore > 0 ? ' winner' : '';
    const rank = medals[i] || `#${i + 1}`;
    el.innerHTML += `<div class="final-row${win}"><span class="rank">${rank}</span><span class="name">${esc(g.name)}</span><span class="pts">${g.score}</span></div>`;
  });
}

// ============================================================
// OVERLAY (confirmation dialogs)
// ============================================================
function showOverlay(title, msg, onConfirm) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  const btn = document.getElementById('confirm-action-btn');
  btn.onclick = onConfirm;
  document.getElementById('confirm-overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('confirm-overlay').classList.remove('active');
}

// ============================================================
// GAME HISTORY (localStorage)
// ============================================================
const HISTORY_KEY = '5b-activity-history';

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch { return []; }
}

function saveGameToHistory() {
  if (!state.groups.length) return;
  const totalScore = state.groups.reduce((s, g) => s + g.score, 0);
  if (totalScore === 0) return; // Don't save empty games
  const history = getHistory();
  const maxScore = Math.max(...state.groups.map(g => g.score));
  history.unshift({
    date: new Date().toISOString(),
    wordsUsed: state.usedWordIds.size,
    teams: state.groups.map(g => ({ name: g.name, score: g.score, winner: g.score === maxScore })),
  });
  // Keep last 20 games
  if (history.length > 20) history.length = 20;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function deleteHistoryEntry(idx) {
  const history = getHistory();
  history.splice(idx, 1);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function clearHistory() {
  showOverlay('Clear History?', 'Delete all saved game results?', () => {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
    closeOverlay();
  });
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const history = getHistory();
  if (history.length === 0) {
    section.innerHTML = '<h3>Past Games</h3><p class="history-empty">No games played yet.</p>';
    return;
  }
  let html = '<h3>Past Games</h3>';
  history.forEach((game, idx) => {
    const d = new Date(game.date);
    const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    html += `<div class="history-entry">
      <div class="history-header">
        <span class="history-date">${dateStr}${game.wordsUsed ? ' &middot; ' + game.wordsUsed + ' words' : ''}</span>
        <button class="history-delete" onclick="deleteHistoryEntry(${idx})" title="Delete">&times;</button>
      </div>
      <div class="history-scores">`;
    game.teams.forEach(t => {
      const winCls = t.winner ? ' ht-winner' : '';
      html += `<div class="history-team${winCls}"><span class="ht-name">${esc(t.name)}</span><span class="ht-score">${t.score}</span></div>`;
    });
    html += '</div></div>';
  });
  html += '<button class="history-clear" onclick="clearHistory()">Clear all history</button>';
  section.innerHTML = html;
}

// Render history on page load
document.addEventListener('DOMContentLoaded', renderHistory);

// ============================================================
// PREVENT PULL-TO-REFRESH (iOS Safari + Android Chrome)
// ============================================================
(function() {
  let startY = 0;
  document.addEventListener('touchstart', function(e) {
    startY = e.touches[0].pageY;
  }, { passive: true });
  document.addEventListener('touchmove', function(e) {
    const y = e.touches[0].pageY;
    // If at top of page and pulling down, prevent it
    if (window.scrollY === 0 && y > startY) {
      e.preventDefault();
    }
  }, { passive: false });
})();

// ============================================================
// UTILS
// ============================================================
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
